<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giải mã DNS Query</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #1a73e8; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #1557b0; }
        .dns-chain { border-left: 3px solid #1a73e8; padding-left: 20px; margin-top: 20px; }
        .record { margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 4px; animation: fadeIn 0.5s forwards; opacity: 0; }
        .type-cname { color: #e67e22; font-weight: bold; }
        .type-a { color: #27ae60; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Mô phỏng DNS Lookup (Cisco Style)</h2>
    <p>Nhập tên miền để xem cách máy tính "đi hỏi đường":</p>
    
    <div class="input-group">
        <input type="text" id="domainInput" placeholder="Ví dụ: www.cisco.com">
        <button onclick="startLookup()">Truy vấn</button>
    </div>

    <div id="resultChain" class="dns-chain">
        </div>
</div>

<script>
function startLookup() {
    const domain = document.getElementById('domainInput').value || "www.cisco.com";
    const container = document.getElementById('resultChain');
    container.innerHTML = ""; // Xóa kết quả cũ

    // Dữ liệu giả lập mô phỏng theo hình của bạn
    const steps = [
        { name: domain, type: "CNAME", target: domain + ".akadns.net" },
        { name: domain + ".akadns.net", type: "CNAME", target: "wwwds.cisco.com.edgekey.net" },
        { name: "wwwds.cisco.com.edgekey.net", type: "CNAME", target: "e2867.dsca.akamaiedge.net" },
        { name: "e2867.dsca.akamaiedge.net", type: "A", target: "23.41.36.119 (Đích đến cuối cùng!)" }
    ];

    steps.forEach((step, index) => {
        setTimeout(() => {
            const div = document.createElement('div');
            div.className = 'record';
            div.innerHTML = `
                <strong>${step.name}</strong><br>
                <span class="${step.type === 'A' ? 'type-a' : 'type-cname'}">Type ${step.type}</span> 
                ➔ ${step.target}
            `;
            container.appendChild(div);
        }, index * 800); // Tạo hiệu ứng hiện từng dòng
    });
}
</script>

</body>
</html>
