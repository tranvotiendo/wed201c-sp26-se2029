<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Layout Designer - Tự động tạo Code</title>
    <style>
        :root {
            --bg-color: #f5eee6;
            --grid-color: #bcbab5;
            --accent-color: #ff4d94;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #444; }

        /* Vùng thiết kế */
        .canvas {
            position: relative;
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 cột */
            grid-auto-rows: 100px;
            gap: 10px;
            width: 100%;
            max-width: 1000px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Các ô trống có dấu cộng */
        .grid-placeholder {
            border: 2px dashed var(--grid-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--grid-color);
            font-size: 24px;
            transition: background 0.3s;
        }

        .grid-placeholder:hover {
            background: #e2e2e2;
        }

        /* Khối đã tạo */
        .block {
            background-color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            position: relative;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .block .close-btn {
            position: absolute;
            top: 0; right: 0;
            background: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 0 7px 0 7px;
        }

        .controls {
            margin-top: 10px;
            font-size: 12px;
            width: 100%;
        }

        /* Vùng chứa code */
        .output-container {
            margin-top: 30px;
            width: 100%;
            max-width: 1000px;
        }

        textarea {
            width: 100%;
            height: 200px;
            font-family: monospace;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: #2d2d2d;
            color: #76ff03;
            font-size: 14px;
        }

        .btn-reset {
            margin-bottom: 10px;
            padding: 10px 20px;
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Thiết Kế Bố Cục Trang Web</h1>
    <button class="btn-reset" onclick="resetGrid()">Làm mới (Reset)</button>

    <div class="canvas" id="canvas">
        <!-- Các ô grid sẽ được tạo tự động bằng JS -->
    </div>

    <div class="output-container">
        <h3>Generated Code (HTML & CSS Grid):</h3>
        <textarea id="codeOutput" readonly></textarea>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const codeOutput = document.getElementById('codeOutput');
        let blocks = [];
        const cols = 5;
        const rows = 5;

        // Khởi tạo lưới trống
        function initGrid() {
            canvas.innerHTML = '';
            for (let i = 0; i < cols * rows; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'grid-placeholder';
                placeholder.innerHTML = '+';
                placeholder.onclick = () => addBlock(i);
                canvas.appendChild(placeholder);
            }
            renderBlocks();
        }

        function addBlock(index) {
            const row = Math.floor(index / cols) + 1;
            const col = (index % cols) + 1;
            
            const newBlock = {
                id: Date.now(),
                colStart: col,
                rowStart: row,
                colSpan: 1,
                rowSpan: 1,
                color: `#${Math.floor(Math.random()*16777215).toString(16)}`
            };
            
            blocks.push(newBlock);
            update();
        }

        function removeBlock(id) {
            blocks = blocks.filter(b => b.id !== id);
            update();
        }

        function updateBlock(id, prop, value) {
            const block = blocks.find(b => b.id === id);
            if (block) {
                block[prop] = parseInt(value);
                update();
            }
        }

        function update() {
            renderBlocks();
            generateCode();
        }

        function renderBlocks() {
            // Xóa các block cũ (giữ lại placeholder)
            document.querySelectorAll('.block').forEach(el => el.remove());

            blocks.forEach(block => {
                const div = document.createElement('div');
                div.className = 'block';
                div.style.gridColumn = `${block.colStart} / span ${block.colSpan}`;
                div.style.gridRow = `${block.rowStart} / span ${block.rowSpan}`;
                
                div.innerHTML = `
                    <button class="close-btn" onclick="removeBlock(${block.id})">X</button>
                    <strong>Khối ${blocks.indexOf(block) + 1}</strong>
                    <div class="controls">
                        Rộng: <input type="range" min="1" max="${cols - block.colStart + 1}" value="${block.colSpan}" 
                            oninput="updateBlock(${block.id}, 'colSpan', this.value)">
                        <br>
                        Cao: <input type="range" min="1" max="5" value="${block.rowSpan}" 
                            oninput="updateBlock(${block.id}, 'rowSpan', this.value)">
                    </div>
                `;
                canvas.appendChild(div);
            });
        }

        function generateCode() {
            let htmlCode = `<div class="container">\n`;
            let cssCode = `.container {\n  display: grid;\n  grid-template-columns: repeat(${cols}, 1fr);\n  gap: 10px;\n}\n\n`;

            blocks.forEach((block, index) => {
                const className = `item-${index + 1}`;
                htmlCode += `  <div class="${className}">Khối ${index + 1}</div>\n`;
                cssCode += `.${className} {\n  grid-column: ${block.colStart} / span ${block.colSpan};\n  grid-row: ${block.rowStart} / span ${block.rowSpan};\n  background: #eee; border: 1px solid #333;\n}\n\n`;
            });

            htmlCode += `</div>`;
            codeOutput.value = `<style>\n${cssCode}</style>\n\n${htmlCode}`;
        }

        function resetGrid() {
            blocks = [];
            update();
        }

        initGrid();
    </script>
</body>
</html>
